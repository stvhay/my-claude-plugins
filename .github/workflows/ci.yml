name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run tests
        working-directory: plugins/dev-workflow-toolkit
        run: uv run pytest tests/ -v

      - name: Run quality gate
        working-directory: plugins/dev-workflow-toolkit
        run: uv run python scripts/quality_gate.py --path ${{ github.workspace }}
