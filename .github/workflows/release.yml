name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version changes
        id: version
        run: |
          CHANGED=false
          for pj in plugins/*/.claude-plugin/plugin.json; do
            if git diff HEAD~1 --name-only | grep -qF "$pj"; then
              CHANGED=true
              break
            fi
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Create timestamp tag and release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(date -u +%Y-%m-%dT%H%M%SZ)
          git tag "$TAG"
          git push origin "$TAG"

          BODY=""
          for pj in plugins/*/.claude-plugin/plugin.json; do
            if git diff HEAD~1 --name-only | grep -qF "$pj"; then
              PLUGIN_DIR=$(dirname "$(dirname "$pj")")
              PLUGIN_NAME=$(basename "$PLUGIN_DIR")
              VERSION=$(python3 -c "import json; print(json.load(open('$pj'))['version'])")
              CHANGELOG="$PLUGIN_DIR/CHANGELOG.md"
              if [ -f "$CHANGELOG" ]; then
                SECTION=$(sed -n "/^## v${VERSION}$/,/^## v/{ /^## v${VERSION}$/d; /^## v/d; p; }" "$CHANGELOG")
                BODY="${BODY}## ${PLUGIN_NAME} v${VERSION}\n\n${SECTION}\n\n"
              fi
            fi
          done

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$(echo -e "$BODY")"
