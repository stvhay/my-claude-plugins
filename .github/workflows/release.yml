name: Release

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions for unreleased plugins
        id: bump
        run: |
          BUMPED=false
          RELEASE_BODY=""

          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            changelog="$plugin_dir/CHANGELOG.md"

            if [ ! -f "$changelog" ]; then
              continue
            fi

            if ! grep -q '^## Unreleased' "$changelog"; then
              continue
            fi

            echo "Bumping version for plugin '$plugin_name'"

            uv run --project plugins/dev-workflow-toolkit \
              python plugins/dev-workflow-toolkit/scripts/compute_version.py \
              --ci --update --project-root "$plugin_dir"

            # Read new version from plugin.json
            plugin_json="$plugin_dir/.claude-plugin/plugin.json"
            VERSION=$(python3 -c "import json; print(json.load(open('$plugin_json'))['version'])")

            # Stage files
            git add "$plugin_json" "$changelog"
            if [ -f "$plugin_dir/pyproject.toml" ]; then
              git add "$plugin_dir/pyproject.toml"
            fi
            if [ -f plugins/dev-workflow-toolkit/uv.lock ]; then
              git add plugins/dev-workflow-toolkit/uv.lock
            fi

            git commit -m "chore: bump $plugin_name to v$VERSION"

            # Collect changelog section for release notes
            SECTION=$(sed -n "/^## v${VERSION}$/,/^## v/{ /^## v${VERSION}$/d; /^## v/d; p; }" "$changelog")
            RELEASE_BODY="${RELEASE_BODY}## ${plugin_name} v${VERSION}\n\n${SECTION}\n\n"

            BUMPED=true
          done

          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          # Write release body to file to preserve newlines
          echo -e "$RELEASE_BODY" > /tmp/release-body.md

      - name: Push version commits
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          NEW_SHA=$(git rev-parse HEAD)
          TEMP_BRANCH="release/tmp-$(date -u +%Y%m%d%H%M%S)"

          # Push objects to GitHub via unprotected temp branch
          git push origin "HEAD:refs/heads/$TEMP_BRANCH"

          # Fast-forward main ref via API (app token bypasses rulesets)
          gh api --method PATCH "repos/${{ github.repository }}/git/refs/heads/main" \
            --field sha="$NEW_SHA" \
            --field force=false

          # Clean up temp branch
          git push origin --delete "$TEMP_BRANCH"

      - name: Create timestamp tag and release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG=$(date -u +%Y-%m-%dT%H%M%SZ)
          gh api --method POST "repos/${{ github.repository }}/git/refs" \
            --field ref="refs/tags/$TAG" \
            --field sha="$(git rev-parse HEAD)"

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file /tmp/release-body.md
